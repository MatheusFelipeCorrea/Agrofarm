services:
  postgres:
    container_name: agrofarm_postgres
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: agrofarm
      POSTGRES_PASSWORD: agrofarm123
      POSTGRES_DB: agrofarm_local
    ports:
      - "5432:5432"
    volumes:
      - agrofarm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrofarm -d agrofarm_local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  agrofarm_postgres_data:
